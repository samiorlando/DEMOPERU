<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0b10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Broadcast Audio Processor Pro - Real-time monitoring with LUFS, dynamics, Solo/Mute">
    <title>Broadcast Processor Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect rx='8' width='64' height='64' fill='%2313151d'/><rect x='8' y='12' width='6' height='40' rx='3' fill='%2300e676'/><rect x='18' y='20' width='6' height='32' rx='3' fill='%2300e676'/><rect x='28' y='8' width='6' height='44' rx='3' fill='%23ffd600'/><rect x='38' y='24' width='6' height='28' rx='3' fill='%23ff1744'/><rect x='48' y='16' width='6' height='36' rx='3' fill='%2300e676'/></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Broadcast Processor Panel</h1>
    <div class="toolbar">
        <select id="inputDeviceSelect"><option value="">🎛️ Cargando...</option></select>
        <button id="btnRefreshDevices" title="Actualizar">🔄</button>
        <button id="btnMic">🎤 Mic</button>
        <label class="file-label" for="fileInput">🎵 Archivo</label>
        <input type="file" id="fileInput" accept="audio/*">
        <button id="btnSave">💾 Guardar</button>
        <button id="btnLoad">📂 Cargar</button>
        <button id="btnReset">↺ Reset</button>
        <button id="btnInstall" style="display:none">📲 Instalar</button>
    </div>
    <div class="grid" id="grid"></div>
    <div id="tooltip"></div>
    <div id="toast" class="toast hidden"></div>
    <script src="app.js" defer></script>
    <script>
        // PWA Install Prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('btnInstall').style.display = '';
        });
        document.getElementById('btnInstall')?.addEventListener('click', async () => {
            if(!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if(outcome === 'accepted') document.getElementById('btnInstall').style.display = 'none';
            deferredPrompt = null;
        });
        // Service Worker
        if('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
        }
    </script>
</body>
</html>
